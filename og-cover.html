<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #0a0a0f;
    font-family: 'Space Mono', monospace; color: #ededf0;
}
.wrap { width: 1200px; height: 630px; position: relative; overflow: hidden; }
.grid {
    position: absolute; inset: 0;
    background-image:
        linear-gradient(rgba(167,139,250,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(167,139,250,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.7;
}
.glow1 {
    position: absolute; left: -120px; top: -120px;
    width: 520px; height: 520px;
    background: radial-gradient(circle, rgba(167,139,250,0.18), transparent 60%);
    z-index: 1;
}
.glow2 {
    position: absolute; right: -80px; bottom: -120px;
    width: 480px; height: 480px;
    background: radial-gradient(circle, rgba(141,223,242,0.10), transparent 60%);
    z-index: 1;
}
.bracket { position: absolute; width: 36px; height: 36px; opacity: 0.4; z-index: 20; }
.tl { top: 32px; left: 32px; border-top: 2px solid #a78bfa; border-left: 2px solid #a78bfa; }
.tr { top: 32px; right: 32px; border-top: 2px solid #a78bfa; border-right: 2px solid #a78bfa; }
.bl { bottom: 32px; left: 32px; border-bottom: 2px solid #a78bfa; border-left: 2px solid #a78bfa; }
.br { bottom: 32px; right: 32px; border-bottom: 2px solid #a78bfa; border-right: 2px solid #a78bfa; }

.eyebrow {
    position: absolute; top: 80px; left: 80px;
    font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(167,139,250,0.7);
    z-index: 5;
}
.title {
    position: absolute; top: 130px; left: 80px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 96px; line-height: 0.92; letter-spacing: -0.04em;
    font-weight: 700;
    color: #ededf0;
    z-index: 5;
}
.title .accent { color: #a78bfa; }
.subtitle {
    position: absolute; top: 360px; left: 80px;
    font-size: 18px; line-height: 1.5;
    color: rgba(229,239,232,0.78);
    max-width: 760px;
    z-index: 5;
}

.swatches {
    position: absolute; bottom: 80px; left: 80px;
    display: flex; gap: 14px; align-items: center;
    z-index: 5;
}
.sw { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.18); }
.sw-x26   { background: #16a34a; }
.sw-s3    { background: #8ddff2; }
.sw-core  { background: #a78bfa; }
.swatches .label { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(167,139,250,0.55); margin-left: 6px; }

.url {
    position: absolute; bottom: 80px; right: 80px;
    font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(167,139,250,0.55);
    z-index: 5;
}
.formats {
    position: absolute; top: 96px; right: 80px;
    display: flex; gap: 8px; flex-direction: column; align-items: flex-end;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    z-index: 5;
}
.formats span { padding: 4px 9px; border: 1px solid rgba(167,139,250,0.22); }
</style>
</head>
<body>
<div class="wrap">
    <div class="glow1"></div>
    <div class="glow2"></div>
    <div class="grid"></div>
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>

    <div class="eyebrow">AI MINDSET · BANNER STUDIO</div>
    <div class="title">aim studio<br><span class="accent">{x26 · s3 · core}</span></div>
    <div class="subtitle">multi-lab banner generator · 3:1 wide · square · story · carousel · click any text to edit · drag photos · ✨ generate AI backgrounds via OpenRouter</div>

    <div class="formats">
        <span>3:1 wide</span>
        <span>square</span>
        <span>carousel 4:5</span>
        <span>story 9:16</span>
    </div>

    <div class="swatches">
        <span class="sw sw-x26"></span>
        <span class="sw sw-s3"></span>
        <span class="sw sw-core"></span>
        <span class="label">three labs · one design system</span>
    </div>
    <div class="url">aim-studio.netlify.app</div>
</div>
</body>
</html>
